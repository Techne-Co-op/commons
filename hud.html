<!doctype html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CIS Implementation HUD · RegenHub Commons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="commons.css">
  <style>
    /* tokens → commons.css */
    /* instrument grammar: mono body, compact 14px base */
    html { font-size: 14px; }
    body { font-family: var(--font-mono); min-height: 100vh; }

    /* ── top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      height: 52px;
    }
    .topbar-back {
      font-size: 10.5px;
      color: var(--faint);
      text-decoration: none;
      letter-spacing: .1em;
      flex-shrink: 0;
      transition: color .15s;
    }
    .topbar-back:hover { color: var(--terra-text); }
    .topbar-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .topbar-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 15px;
      color: var(--heading);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-sub {
      font-size: 10px;
      color: var(--faint);
      letter-spacing: .06em;
      flex-shrink: 0;
      display: none;
    }
    @media (min-width: 900px) { .topbar-sub { display: block; } }

    .topbar-chips {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .chip {
      font-size: 10px;
      letter-spacing: .06em;
      padding: 3px 9px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface2);
      white-space: nowrap;
    }
    .chip.c-active  { color: var(--info);      background: var(--info-dim);  border-color: var(--info); }
    .chip.c-done    { color: var(--ok);         background: var(--ok-dim);    border-color: var(--ok); }
    .chip.c-blocked { color: var(--warn);       background: var(--warn-dim);  border-color: var(--warn); }
    .chip.c-terra   { color: var(--terra-text); background: var(--terra-dim); border-color: var(--terra); }

    .mode-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .08em;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .mode-btn:hover { border-color: var(--terra); color: var(--terra-text); }

    /* ── 3-column layout ── */
    .hud-grid {
      display: grid;
      grid-template-columns: 196px 1fr 256px;
      grid-template-areas: "rail main ctx";
      max-width: 1640px;
      margin: 0 auto;
    }
    @media (max-width: 1100px) {
      .hud-grid { grid-template-columns: 180px 1fr; grid-template-areas: "rail main"; }
      .ctx-panel { display: none; }
    }
    @media (max-width: 720px) {
      .hud-grid { grid-template-columns: 1fr; grid-template-areas: "main"; }
      .wave-rail { display: none; }
    }

    /* ── wave rail ── */
    .wave-rail {
      grid-area: rail;
      border-right: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .rail-group-label {
      font-size: 8.5px;
      letter-spacing: .16em;
      color: var(--faint);
      text-transform: uppercase;
      padding: 0 14px;
      margin-top: 14px;
      margin-bottom: 5px;
    }
    .rail-group-label:first-child { margin-top: 0; }
    .wave-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      color: var(--muted);
      text-align: left;
      transition: background .12s, color .12s;
    }
    .wave-btn:hover { background: var(--surface); color: var(--text); }
    .wave-btn.on { background: var(--terra-dim); color: var(--terra-text); }
    .wave-btn-id { font-weight: 500; min-width: 28px; }
    .wave-btn-name { flex: 1; font-size: 9.5px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wave-btn.on .wave-btn-name { color: var(--terra-text); opacity: .8; }
    .wave-pips { display: flex; gap: 2px; align-items: center; }
    .wave-pip {
      width: 5px; height: 5px; border-radius: 1px;
      background: var(--border);
      flex-shrink: 0;
    }
    .wave-pip.done    { background: var(--ok); }
    .wave-pip.active  { background: var(--terra); }
    .wave-pip.ready   { background: var(--info); opacity: .5; }

    /* ── main panel ── */
    .main-panel {
      grid-area: main;
      padding: 24px 28px;
      min-height: calc(100vh - 52px);
    }

    /* ── overview bar ── */
    .overview-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .overview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 10px;
    }
    .overview-label { font-family: 'Libre Baskerville', serif; font-size: 13px; color: var(--heading); }
    .prog-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .prog-fill {
      height: 100%;
      background: var(--ok);
      border-radius: 3px;
      transition: width .4s ease;
      min-width: 0;
    }
    .wave-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .wave-pill {
      font-size: 9px;
      letter-spacing: .06em;
      padding: 3px 9px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--faint);
      background: var(--surface2);
      transition: border-color .12s, color .12s;
      white-space: nowrap;
    }
    .wave-pill:hover   { border-color: var(--terra); color: var(--terra-text); }
    .wave-pill.on      { border-color: var(--terra); color: var(--terra-text); background: var(--terra-dim); }
    .wave-pill.wdone   { border-color: var(--ok);    color: var(--ok);         background: var(--ok-dim); }
    .wave-pill.wactive { border-color: var(--info);  color: var(--info);       background: var(--info-dim); }

    /* ── section headers ── */
    .sh {
      font-size: 8.5px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--faint);
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
      margin-top: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sh:first-of-type { margin-top: 0; }
    .sh-count {
      font-size: 9px;
      color: var(--faint);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 2px;
    }

    /* ── milestone cards ── */
    .m-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 5px;
      transition: border-color .12s;
    }
    .m-card:hover { border-color: var(--muted); }
    .m-card.t-warn    { border-left: 2px solid var(--warn); }
    .m-card.t-info    { border-left: 2px solid var(--info); }
    .m-card.t-terra   { border-left: 2px solid var(--terra); background: rgba(200,105,58,.06); }
    .m-card.t-ok      { border-left: 2px solid var(--ok); opacity: .72; }
    .m-card.t-pending { border-left: 2px solid var(--border); }

    .m-id {
      font-size: 9.5px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .06em;
      min-width: 46px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .m-body { flex: 1; min-width: 0; }
    .m-title { font-size: 12px; color: var(--text); line-height: 1.4; }
    .m-meta  { font-size: 9.5px; color: var(--faint); margin-top: 3px; line-height: 1.5; }
    .m-deps  { display: inline; }
    .m-dep   { display: inline-block; font-size: 8.5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; padding: 0 4px; margin: 1px 2px 0 0; color: var(--faint); }

    .m-badge {
      font-size: 8.5px;
      letter-spacing: .07em;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      align-self: center;
      white-space: nowrap;
    }
    .b-pending    { color: var(--faint);      background: var(--surface2);  border-color: var(--border); }
    .b-in_progress{ color: var(--terra-text); background: var(--terra-dim); border-color: var(--terra); }
    .b-done       { color: var(--ok);         background: var(--ok-dim);    border-color: var(--ok); }
    .b-verified   { color: var(--ok);         background: var(--ok-dim);    border-color: var(--ok); }
    .b-review     { color: var(--warn);       background: var(--warn-dim);  border-color: var(--warn); }
    .b-blocked    { color: var(--faint);      background: var(--surface2);  border-color: var(--border); }

    .empty-note {
      font-size: 11px;
      color: var(--faint);
      padding: 8px 0 4px;
      font-style: italic;
      line-height: 1.6;
    }

    /* ── wave group ── */
    .wave-group-label {
      font-size: 8.5px;
      color: var(--faint);
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 10px 0 5px;
      margin-top: 4px;
    }

    /* ── context panel ── */
    .ctx-panel {
      grid-area: ctx;
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .ctx-section { margin-bottom: 22px; }
    .ctx-head {
      font-size: 8.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--faint);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .ctx-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 10.5px;
    }
    .ctx-row:last-child { border-bottom: none; }
    .ctx-row-label { color: var(--muted); }
    .ctx-row-val { color: var(--text); font-weight: 500; }
    .ctx-row-val.v-ok   { color: var(--ok); }
    .ctx-row-val.v-info { color: var(--info); }
    .ctx-row-val.v-warn { color: var(--warn); }

    .ctx-link {
      display: block;
      font-size: 10px;
      color: var(--faint);
      text-decoration: none;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      letter-spacing: .04em;
      transition: color .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ctx-link:last-child { border-bottom: none; }
    .ctx-link:hover { color: var(--terra-text); }

    .wave-table { font-size: 9.5px; width: 100%; border-collapse: collapse; }
    .wave-table td { padding: 3px 0; vertical-align: middle; }
    .wave-table .wt-id   { color: var(--muted); min-width: 28px; }
    .wave-table .wt-name { color: var(--faint); padding: 0 6px; }
    .wave-table .wt-n    { color: var(--faint); text-align: right; min-width: 24px; }
    .wave-table .wt-bar  { width: 48px; padding-left: 6px; }
    .wt-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .wt-bar-fill  { height: 100%; background: var(--ok); border-radius: 2px; }

    .ctx-note {
      font-size: 9.5px;
      color: var(--faint);
      line-height: 1.6;
    }

    /* ── explorer ── */
    .explorer-wrap {
      max-width: 1640px;
      margin: 0 auto;
      padding: 0 28px 48px;
      border-top: 1px solid var(--border);
    }
    .explorer-head {
      padding: 22px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .explorer-title {
      font-size: 8.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .explorer-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: .07em;
      padding: 3px 9px;
      border-radius: 2px;
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: border-color .12s, color .12s, background .12s;
    }
    .filter-btn:hover { border-color: var(--terra); color: var(--terra-text); }
    .filter-btn.on { background: var(--terra-dim); border-color: var(--terra); color: var(--terra-text); }
    .search-box {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 3px;
      width: 180px;
      transition: border-color .12s;
    }
    .search-box:focus { outline: none; border-color: var(--terra); }
    .search-box::placeholder { color: var(--faint); }

    .ex-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .ex-table th {
      text-align: left;
      font-size: 8.5px;
      letter-spacing: .1em;
      color: var(--faint);
      padding: 7px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .ex-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .ex-table tr:hover td { background: var(--surface); }
    .ex-table .c-id    { font-weight: 500; color: var(--muted); letter-spacing: .05em; white-space: nowrap; }
    .ex-table .c-title { color: var(--text); }
    .ex-table .c-wave  { color: var(--faint); white-space: nowrap; }
    .ex-table .c-owner { color: var(--faint); font-size: 10px; }
    .ex-table .c-verif { color: var(--faint); font-size: 9.5px; }
    .ex-table .c-status { white-space: nowrap; }

    /* ── hub ops guide layer ── */
    .hub-phase-strip {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .hub-phase {
      flex: 1;
      min-width: 84px;
      padding: 7px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--surface2);
    }
    .hub-phase.hp-active {
      border-color: var(--terra);
      background: var(--terra-dim);
    }
    .hub-phase.hp-done {
      border-color: var(--ok);
      background: var(--ok-dim);
      opacity: .72;
    }
    .hp-id {
      display: block;
      font-size: 8.5px;
      letter-spacing: .1em;
      color: var(--faint);
      margin-bottom: 3px;
    }
    .hub-phase.hp-active .hp-id { color: var(--terra-text); }
    .hub-phase.hp-done .hp-id   { color: var(--ok); }
    .hp-name {
      display: block;
      font-size: 10.5px;
      color: var(--muted);
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .hub-phase.hp-active .hp-name { color: var(--terra-text); }
    .hub-phase.hp-done .hp-name   { color: var(--ok); opacity: .8; }
    .hp-win {
      display: block;
      font-size: 8.5px;
      color: var(--faint);
    }
    .hub-phase.hp-active .hp-win { color: var(--terra-text); opacity: .7; }

    .hub-kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    @media (max-width: 760px) { .hub-kpi-grid { grid-template-columns: 1fr; } }

    .hub-kpi-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
    }
    .hkt-label {
      font-size: 8.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 6px;
    }
    .hkt-value {
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .hkt-value.v-ok   { color: var(--ok); }
    .hkt-value.v-info { color: var(--info); }
    .hkt-value.v-warn { color: var(--warn); }
    .hkt-threshold {
      font-size: 9px;
      color: var(--faint);
      margin-bottom: 8px;
    }
    .hkt-prov {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: 9px;
      color: var(--muted);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-left: 2px solid var(--terra);
      border-radius: 3px;
      padding: 2px 7px;
      margin-top: auto;
    }
    .hkt-prov .cite { color: var(--terra-text); }
    .hkt-prov .sep  { color: var(--faint); }

    .crops-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    .crops-row:last-child { border-bottom: none; }
    .crops-id {
      font-size: 11px;
      font-weight: 500;
      color: var(--terra-text);
      min-width: 22px;
    }
    .crops-name {
      color: var(--muted);
      flex: 1;
      font-size: 9.5px;
    }
    .crops-stage {
      font-size: 9px;
      color: var(--faint);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 5px;
    }

    /* ── loop module ── */
    .lp-decision-card { cursor: pointer; transition: background .15s; }
    .lp-decision-card:hover { background: var(--surface2); }
    .lp-decision-card.expanded .lp-card-detail { display: block; }
    .lp-card-detail {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 10.5px;
      color: var(--muted);
      line-height: 1.7;
    }
    .lp-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; width: 100%; }
    .lp-leverage {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }
    .lp-leverage-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .lp-leverage-fill  { height: 100%; background: var(--terra); border-radius: 2px; transition: width .3s; }
    .lp-leanings { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .lp-lean { font-size: 9px; padding: 1px 6px; border-radius: 10px; background: var(--surface2); color: var(--muted); }
    .lp-lean-adopt  { background: var(--ok-dim);   color: var(--ok); }
    .lp-lean-prefer { background: var(--info-dim); color: var(--info); }
    .lp-lean-defer  { background: var(--warn-dim); color: var(--warn); }
    .lp-state {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      align-self: flex-start;
      white-space: nowrap;
    }
    .lp-state-deliberating    { background: var(--info-dim); color: var(--info); }
    .lp-state-ready_to_record { background: var(--warn-dim); color: var(--warn); }
    .lp-state-recorded        { background: var(--ok-dim);   color: var(--ok); }
    .lp-state-no_thread       { background: var(--surface2); color: var(--muted); }
    .lp-counts { display: flex; gap: 4px; flex-wrap: wrap; }
    .lp-count  { font-size: 9px; padding: 2px 7px; border-radius: 3px; background: var(--surface2); color: var(--muted); }
    .lp-count-done   { background: var(--ok-dim);   color: var(--ok); }
    .lp-count-active { background: var(--info-dim); color: var(--info); }
    .lp-count-blocked{ background: var(--warn-dim); color: var(--warn); }
    .lp-banner {
      padding: 7px 11px;
      border-radius: 3px;
      font-size: 10px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .lp-banner-warn { background: var(--warn-dim); color: var(--warn); border-left: 2px solid var(--warn); }
    .lp-banner-ok   { background: var(--ok-dim);   color: var(--ok);   border-left: 2px solid var(--ok); }

  const statusMap = {};
  nodes.forEach(n => { statusMap[n.id] = n.status; });

    const deps = n.depends_on || [];
    const ready = n.status === 'pending' && deps.every(d => ['done','verified'].includes(statusMap[d] || ''));
    const isDecision = n.wave === 'D' || n.wave === 'R';
    return Object.assign({}, n, {
      _ready: ready,
      _isDecision: isDecision,
      _isBlocker: isDecision && n.status === 'pending'
    });
  });
}

function waveSummary(nodes) {
  const m = {};
  WAVE_ORDER.forEach(w => { m[w] = { total:0, done:0, active:0, ready:0 }; });
  nodes.forEach(n => {
    if (!m[n.wave]) return;
    m[n.wave].total++;
    if (['done','verified'].includes(n.status)) m[n.wave].done++;
    else if (n.status === 'in_progress') m[n.wave].active++;
    else if (n._ready && !n._isBlocker) m[n.wave].ready++;
  });
  return m;
}

/* ── badge html ── */
const BADGE_LABELS = { pending:'pending', in_progress:'active', done:'done', verified:'verified', review:'review', blocked:'blocked' };
function badge(status) {
  return `<span class="m-badge b-${status}">${BADGE_LABELS[status] || status}</span>`;
}

/* ── wave rail ── */
function renderRail(nodes) {
  const ws = waveSummary(nodes);
  let h = '';

  /* hub ops entry — always shown */
  const hubPips = HUB_LIFECYCLE.map(lc => {
    const cls = lc.status === 'done' ? 'done' : lc.status === 'in_progress' ? 'active' : '';
    return `<span class="wave-pip ${cls}"></span>`;
  }).join('');
  h += `<div class="rail-group-label">Hub Operations</div>`;
  h += `<button class="wave-btn${hubMode ? ' on' : ''}" onclick="setHub()" aria-pressed="${hubMode}">
    <span class="wave-btn-id">HUB</span>
    <span class="wave-btn-name">EE Grant · Ph01</span>
    <span class="wave-pips">${hubPips}</span>
  </button>`;

  /* loop entry */
  const loopPips = [
    loopState.front.length > 0 ? 'done' : '',
    loopState.decisions.length > 0 ? 'active' : '',
    loopState.blockers.filter(b => b.state === 'open').length > 0 ? 'active' : ''
  ].map(c => `<span class="wave-pip ${c}"></span>`).join('');
  h += `<button class="wave-btn${loopMode ? ' on' : ''}" onclick="setLoop()" aria-pressed="${loopMode}">
    <span class="wave-btn-id">LOOP</span>
    <span class="wave-btn-name">Signal loop</span>
    <span class="wave-pips">${loopPips}</span>
  </button>`;

  /* doc entry */
  const docFulfilled = DOC_DELIVERABLES.filter(d => d.standing === 'produced' || d.standing === 'by_reference').length;
  const docGaps = DOC_DELIVERABLES.filter(d => d.anchor === null).length;
  const docPips = [
    docFulfilled > 0 ? 'done' : '',
    DOC_DELIVERABLES.filter(d => d.standing === 'partial' || d.standing === 'proposed').length > 0 ? 'active' : '',
    docGaps > 0 ? 'active' : ''
  ].map(c => `<span class="wave-pip ${c}"></span>`).join('');
  h += `<button class="wave-btn${docMode ? ' on' : ''}" onclick="setDoc()" aria-pressed="${docMode}">
    <span class="wave-btn-id">DOC</span>
    <span class="wave-btn-name">Doc fulfilment</span>
    <span class="wave-pips">${docPips}</span>
  </button>`;

  const groups = [
    { label:'Governance', waves:['D','R'] },
    { label:'Build waves', waves:['W0','W1','W2','W3','W4','W5','W6'] },
    { label:'Milestones', waves:['G','P'] }
  ];

  for (const g of groups) {
    const hasAny = g.waves.some(w => ws[w] && ws[w].total > 0);
    if (!hasAny) continue;
    h += `<div class="rail-group-label">${g.label}</div>`;
    for (const w of g.waves) {
      const wv = ws[w];
      if (!wv || wv.total === 0) continue;
      const isOn = waveFilter === w;

      // pip indicators (max 8)
      const limit = Math.min(wv.total, 8);
      const wNodes = nodes.filter(n => n.wave === w).slice(0, limit);
      let pips = wNodes.map(n => {
        const cls = ['done','verified'].includes(n.status) ? 'done' : n.status === 'in_progress' ? 'active' : n._ready ? 'ready' : '';
        return `<span class="wave-pip ${cls}"></span>`;
      }).join('');

      h += `<button class="wave-btn${isOn ? ' on' : ''}" onclick="setWave('${w}')" aria-pressed="${isOn}">
        <span class="wave-btn-id">${w}</span>
        <span class="wave-btn-name">${WAVE_LABELS[w]||w}</span>
        <span class="wave-pips">${pips}</span>
      </button>`;
    }
  }
  document.getElementById('waveRail').innerHTML = h;
}

/* ── top chips ── */
function renderChips(nodes) {
  const total = nodes.length;
  const done = nodes.filter(n => ['done','verified'].includes(n.status)).length;
  const active = nodes.filter(n => n.status === 'in_progress').length;
  const blockers = nodes.filter(n => n._isBlocker).length;
  const pct = Math.round(done / total * 100);

  const chips = document.getElementById('topChips');
  let h = `<span class="chip">${done}/${total} &middot; ${pct}%</span>`;
  if (active > 0) h += `<span class="chip c-active">${active} active</span>`;
  if (blockers > 0) h += `<span class="chip c-blocked">${blockers} decisions open</span>`;
  if (done === total && total > 0) h += `<span class="chip c-done">complete</span>`;
  chips.innerHTML = h;
}

/* ── main panel ── */
function renderMain(nodes) {
  const filtered = waveFilter ? nodes.filter(n => n.wave === waveFilter) : nodes;
  const ws = waveSummary(nodes);

  const total = filtered.length;
  const done = filtered.filter(n => ['done','verified'].includes(n.status)).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const label = waveFilter ? (WAVE_FULL[waveFilter] || waveFilter) : 'All waves';

  let h = '';

  /* overview bar */
  let pillsH = '';
  for (const w of WAVE_ORDER) {
    const wv = ws[w];
    if (!wv || wv.total === 0) continue;
    const allDone = wv.done === wv.total;
    const someActive = wv.active > 0;
    const cls = allDone ? 'wdone' : someActive ? 'wactive' : '';
    const isOn = waveFilter === w;
    pillsH += `<span class="wave-pill ${cls}${isOn ? ' on' : ''}" onclick="setWave('${w}')" role="button" tabindex="0">${w} ${wv.done}/${wv.total}</span>`;
  }

  h += `<div class="overview-bar">
    <div class="overview-row">
      <span class="overview-label">${label}</span>
      <span>${done} of ${total} complete &middot; ${pct}%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${Math.max(pct,0)}%"></div></div>
    <div class="wave-pills">${pillsH}</div>
  </div>`;

  /* blockers */
  const blockers = filtered.filter(n => n._isBlocker);
  h += `<div class="sh"><span>Open decisions &amp; ratifications</span><span class="sh-count">${blockers.length}</span></div>`;
  if (blockers.length === 0) {
    h += `<p class="empty-note">All decisions recorded — build tree is unlocked.</p>`;
  } else {
    for (const n of blockers) h += card(n, 't-warn');
  }

  /* active */
  const active = filtered.filter(n => n.status === 'in_progress');
  h += `<div class="sh"><span>In progress</span><span class="sh-count">${active.length}</span></div>`;
  if (active.length === 0) {
    h += `<p class="empty-note">Nothing active yet.</p>`;
  } else {
    for (const n of active) h += card(n, 't-terra');
  }

  /* ready */
  const ready = filtered.filter(n => n._ready && !n._isBlocker && n.status === 'pending');
  h += `<div class="sh"><span>Ready to start</span><span class="sh-count">${ready.length}</span></div>`;
  if (ready.length === 0) {
    h += `<p class="empty-note">No steps are unblocked. Record open decisions to unlock the build tree.</p>`;
  } else {
    for (const n of ready) h += card(n, 't-info');
  }

  /* pending (blocked by upstream) */
  const blocked = filtered.filter(n => n.status === 'pending' && !n._ready && !n._isBlocker);
  if (blocked.length > 0) {
    h += `<div class="sh"><span>Pending &middot; upstream dependencies</span><span class="sh-count">${blocked.length}</span></div>`;
    const byWave = {};
    blocked.forEach(n => { (byWave[n.wave] = byWave[n.wave] || []).push(n); });
    for (const w of WAVE_ORDER) {
      if (!byWave[w]) continue;
      h += `<div class="wave-group-label">${w} &middot; ${WAVE_LABELS[w]||w}</div>`;
      for (const n of byWave[w]) h += card(n, 't-pending');
    }
  }

  /* done */
  const doneItems = filtered.filter(n => ['done','verified'].includes(n.status));
  if (doneItems.length > 0) {
    h += `<div class="sh"><span>Complete</span><span class="sh-count">${doneItems.length}</span></div>`;
    for (const n of doneItems) h += card(n, 't-ok');
  }

  document.getElementById('mainPanel').innerHTML = h;
}

  const deps = (n.depends_on || []);
  const depsH = deps.length ? `<span class="m-deps">&nbsp;&middot; needs: ${deps.map(d => `<span class="m-dep">${d}</span>`).join('')}</span>` : '';
  return `<div class="m-card ${typeClass}">

      <div class="m-meta">${n.owner || ''}${depsH}</div>

}

/* ── loop module ── */
function setLoop() {
  loopMode = !loopMode;
  if (loopMode) {
    hubMode = false;
    docMode = false;
    waveFilter = null;
    const hc = document.getElementById('hubChip');
    if (hc) hc.style.outline = '';
    const dc = document.getElementById('docChip');
    if (dc) dc.style.outline = '';
    if (!loopLoaded) loopLoad();
  }
  const lc = document.getElementById('loopChip');
  if (lc) lc.style.outline = loopMode ? '2px solid var(--info)' : '';
  render();
}

async function loopLoad() {
  /* lazy-load loop.config.js if not already present */
  if (!window.LOOP_CONFIG) {
    await new Promise(resolve => {
      const s = document.createElement('script');
      s.src = 'loop.config.js';
      s.onload = resolve;
      s.onerror = resolve;
      document.head.appendChild(s);
    });
  }
  const cfg = window.LOOP_CONFIG ?? {};
  if (!cfg.supabaseUrl || !cfg.supabaseAnon) {
    await loopLoadFallback(cfg.ledgerFallback ?? 'milestones/index.json');
    return;
  }
  /* lazy-load Supabase CDN if not already present */
  if (typeof supabase === 'undefined') {
    await new Promise(resolve => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
      s.onload = resolve;
      s.onerror = resolve;
      document.head.appendChild(s);
    });
  }
  try {
    if (typeof supabase !== 'undefined') {
      loopSb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnon);
      await loopLoadAll();
    } else {
      await loopLoadFallback(cfg.ledgerFallback ?? 'milestones/index.json');
    }
  } catch(e) {
    await loopLoadFallback(cfg.ledgerFallback ?? 'milestones/index.json');
  }
}

async function loopLoadAll() {
  const [pulseRes, frontRes, decRes, blockRes, agingRes] = await Promise.all([
    loopSb.from('v_pulse').select('*').limit(1).maybeSingle(),
    loopSb.from('v_front').select('*').order('wave').order('id'),
    loopSb.from('v_decision_leverage').select('*'),
    loopSb.from('blockers').select('*,raised_by(display_name)').eq('state','open').eq('visibility','public').order('created_at'),
    loopSb.from('v_aging').select('*').order('age',{ascending:false}).limit(20)
  ]);
  if (pulseRes.error) throw new Error(pulseRes.error.message);
  loopState.connected = true;
  loopState.pulse     = pulseRes.data;
  loopState.front     = frontRes.data ?? [];
  loopState.decisions = decRes.data ?? [];
  loopState.blockers  = blockRes.data ?? [];
  loopState.aging     = agingRes.data ?? [];
  loopLoaded = true;
  if (loopMode) render();
}

async function loopLoadFallback(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error(r.status);
    const index = await r.json();
    const nodes = index.nodes ?? [];
    loopState.connected = false;
    loopState.front     = [];
    loopState.decisions = nodes.filter(n =>
      (n.wave === 'D' || n.wave === 'R') && n.status !== 'done' && n.status !== 'verified'
    );
    loopState.blockers  = [];
    loopState.aging     = [];
    loopState.pulse     = {
      status_counts: index.status_counts ?? {},
      entry_count: nodes.length,
      sync_sha: null, synced_at: null, _fallback: true
    };
  } catch(e) { /* silently handled — empty state renders gracefully */ }
  loopLoaded = true;
  if (loopMode) render();
}

function loopFmtAge(interval) {
  if (!interval) return '—';
  if (typeof interval === 'number') {
    const d = Math.floor(interval / 86400000);
    const h = Math.floor((interval % 86400000) / 3600000);
    return d > 0 ? `${d}d ${h}h` : `${h}h`;
  }
  const str = String(interval);
  const days  = str.match(/(\d+)\s+day/);
  const hours = str.match(/(\d+):(\d+):/);
  if (days)  return `${days[1]}d ${hours ? hours[1]+'h' : ''}`.trim();
  if (hours && parseInt(hours[1]) > 0) return `${hours[1]}h ${hours[2]}m`;
  if (hours) return `${hours[2]}m`;
  return str.slice(0, 12);
}

function loopToggleExpand(card) {
  const was = card.classList.contains('expanded');
  document.querySelectorAll('.lp-decision-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!was) card.classList.add('expanded');
}

function renderLoopMain() {
  const offline = !loopState.connected;
  let h = '';

  if (!loopLoaded) {
    document.getElementById('mainPanel').innerHTML =
      '<p style="font-size:11px;color:var(--faint);padding:24px 0;">Connecting to signal loop&hellip;</p>';
    return;
  }

  if (offline) {
    h += `<div class="lp-banner lp-banner-warn">Offline &middot; showing from milestones/index.json. Decision gating and blockers require Supabase connection.</div>`;
  }

  /* ── Front ── */
  h += `<div class="sh" style="margin-top:0"><span>Front &middot; workable now</span><span class="sh-count">${loopState.front.length}</span></div>`;
  if (!loopState.front.length) {
    h += `<p class="empty-note">${offline
      ? 'Decision gating not computed in offline mode.'
      : 'No steps workable yet — all paths blocked by unverified parents or open decisions.'}</p>`;
  } else {
    for (const e of loopState.front) {
      h += `<div class="m-card t-ok">
        <span class="m-id" style="color:var(--ok)">${e.id}</span>
        <div class="m-body">
          <div class="m-title" style="color:var(--ok)">${e.title}</div>
          <div class="m-meta">${e.wave} &middot; ${e.kind ?? ''} &middot; owner: ${e.owner ?? '—'}</div>
          ${e.verification ? `<div class="lp-front-note">verify: ${e.verification}</div>` : ''}
        </div>
        <span class="m-badge" style="border-color:var(--ok);color:var(--ok);background:var(--ok-dim)">${e.status}</span>
      </div>`;
    }
  }

  /* ── Decision queue ── */
  h += `<div class="sh"><span>Decision queue &middot; leverage-ranked</span><span class="sh-count">${loopState.decisions.length}</span></div>`;
  h += `<div class="lp-banner lp-banner-warn">Leanings are non-binding signals. Decisions are human-only (contract:agents§5).</div>`;
  if (!loopState.decisions.length) {
    h += `<p class="empty-note">No open decisions.</p>`;
  } else {
    const maxGated = Math.max(1, ...loopState.decisions.map(d => d.total_gated ?? 0));
    for (const d of loopState.decisions) {
      const gated = d.total_gated ?? 0;
      const pct   = Math.round((gated / maxGated) * 100);
      const leans = d.leanings_summary ?? {};
      const stKey = (d.thread_state ?? 'no_thread').replace(/\s/g,'_');
      const stLbl = (d.thread_state ?? 'no thread').replace(/_/g,' ');
      let leansH  = '';
      if (Object.keys(leans).length) {
        leansH = `<div class="lp-leanings">
          ${leans.adopt_default       ? `<span class="lp-lean lp-lean-adopt">adopt ${leans.adopt_default}</span>`       : ''}
          ${leans.prefer_alternative  ? `<span class="lp-lean lp-lean-prefer">prefer alt ${leans.prefer_alternative}</span>` : ''}
          ${leans.defer               ? `<span class="lp-lean lp-lean-defer">defer ${leans.defer}</span>`               : ''}
          ${leans.need_more_information ? `<span class="lp-lean">need info ${leans.need_more_information}</span>`       : ''}
        </div>`;
      }
      h += `<div class="m-card t-terra lp-decision-card" onclick="loopToggleExpand(this)">
        <div class="lp-card-header">
          <div style="flex:1;min-width:0">
            <span class="m-id">${d.id}</span>
            <div class="m-title" style="margin-top:2px">${d.title}</div>
          </div>
          <span class="lp-state lp-state-${stKey}">${stLbl}</span>
        </div>
        <div class="lp-leverage">
          <span>${gated} gated</span>
          <div class="lp-leverage-track"><div class="lp-leverage-fill" style="width:${pct}%"></div></div>
        </div>
        ${leansH}
        ${d.recorded_pr_url ? `<div style="font-size:10px;margin-top:4px"><a href="${d.recorded_pr_url}" target="_blank" style="color:var(--info)">&rarr; recorded PR</a></div>` : ''}
        <div class="lp-card-detail">
          Wave: ${d.wave} &middot; Status: ${d.decision_status ?? '—'}<br>
          <a href="docs/decisions/${d.id}.md" style="color:var(--info)" target="_blank">&rarr; brief in docs/decisions/</a>
          <div style="margin-top:6px;color:var(--terra-text)">To record: <code>decision-record-draft</code> (authenticated organiser) &rarr; PR &rarr; loop updates on next push.</div>
        </div>
      </div>`;
    }
  }

  /* ── Blockers ── */
  h += `<div class="sh"><span>Blockers</span><span class="sh-count">${loopState.blockers.length}</span></div>`;
  if (!loopState.blockers.length) {
    h += `<p class="empty-note" style="color:${offline ? 'var(--faint)' : 'var(--ok)'}">${offline ? 'Blocker data requires Supabase connection.' : 'No open blockers.'}</p>`;
  } else {
    for (const b of loopState.blockers) {
      const age    = loopFmtAge(b.age ?? '');
      const isCrit = b.age_band === 'critical';
      const lclr   = isCrit ? 'var(--warn)' : 'var(--info)';
      const detail = b.detail ? String(b.detail).replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
      h += `<div class="m-card" style="border-left:2px solid ${lclr}">
        <div class="lp-card-header" style="margin-bottom:4px">
          <span class="m-badge b-pending" style="font-size:8.5px">${b.kind}</span>
          <span class="m-badge ${isCrit ? 'b-review' : ''}" style="${isCrit ? 'border-color:var(--warn);color:var(--warn)' : ''}">${age}</span>
        </div>
        <div class="m-body">
          <div class="m-title">${b.summary}</div>
          ${b.entry_id ? `<div class="m-meta">entry: <code>${b.entry_id}</code></div>` : ''}
          ${detail ? `<div class="m-meta" style="font-style:italic">${detail}</div>` : ''}
          <div class="m-meta">raised by: ${b.raised_by?.display_name ?? '—'}</div>
        </div>
      </div>`;
    }
  }

  document.getElementById('mainPanel').innerHTML = h;
}

      <div class="ctx-row">
        <span class="ctx-row-label">Sync SHA</span>
        <span class="ctx-row-val" style="font-size:9px"><code>${(p.sync_sha ?? '').slice(0,7) || '—'}</code></span>

    ${agingH}
    <div class="ctx-section">
      <div class="ctx-head">Constraint</div>
      <div class="ctx-note">The loop cannot flip a decision, write to the repo, or mark anything <em>recorded</em> without a URL pointing into the canonical record. Authority stays where AGENTS.md rule&nbsp;5 puts it.</div>

  docMode = !docMode;
  if (docMode) {
    hubMode = false;
    loopMode = false;
    waveFilter = null;
    const hc = document.getElementById('hubChip');
    if (hc) hc.style.outline = '';
    const lc = document.getElementById('loopChip');

  }

function setDocLens(l) {
  docLens = l;
  if (docMode) renderDocMain();
}

function setDocFilter(f) {
  docFilter = f;
  if (docMode) renderDocMain();
}

function docSelect(id) {
  docSelected = docSelected === id ? null : id;
  if (docMode) { renderDocMain(); renderDocCtx(); }
}

function docCard(d) {
  const isUnanchored = d.anchor === null;
  const stCls = isUnanchored ? 'st-unanchored' : `st-${d.standing}`;
  const badgeCls = `dsb-${d.standing}`;
  const badgeLbl = DOC_STANDING_LABELS[d.standing] || d.standing;
  const anchorTag = isUnanchored
    ? `<span class="dc-anchor-tag warn">unanchored</span>`
    : d.anchor ? `<span class="dc-anchor-tag">${d.anchor}</span>` : '';
  const refH = (d.ref || anchorTag)
    ? `<div class="dc-card-ref">${d.ref || ''}${anchorTag}</div>`
    : '';
  const sel = docSelected === d.id ? ' selected' : '';
  return `<div class="dc-card ${stCls}${sel}" onclick="docSelect('${d.id}')" role="button" tabindex="0">
    <span class="dc-card-id">${d.id}</span>
    <div class="dc-card-body">
      <div class="dc-card-title">${d.title}</div>
      ${refH}
    </div>
    <span class="dc-standing-badge ${badgeCls}">${badgeLbl}</span>
  </div>`;
}

function renderDocMain() {
  const all = DOC_DELIVERABLES;

  /* apply filter */
  let filtered = all;
  if (docFilter !== 'ALL') {
    if (docFilter === 'unanchored') filtered = all.filter(d => d.anchor === null);
    else filtered = all.filter(d => d.standing === docFilter);
  }

  /* summary stats */
  const stats = {
    produced:     all.filter(d => d.standing === 'produced').length,
    by_reference: all.filter(d => d.standing === 'by_reference').length,
    proposed:     all.filter(d => d.standing === 'proposed').length,
    partial:      all.filter(d => d.standing === 'partial').length,
    queued:       all.filter(d => d.standing === 'queued').length,
    projected:    all.filter(d => d.standing === 'projected' && d.anchor !== null).length,
    unanchored:   all.filter(d => d.anchor === null).length
  };
  const fulfilled = stats.produced + stats.by_reference;
  const pct = Math.round(fulfilled / all.length * 100);

  let h = '';

  /* masthead */
  h += `<div class="dc-masthead">
    <div class="dc-masthead-title">Documentation Fulfilment</div>
    <div class="dc-masthead-sub">${all.length} deliverables &middot; 8 phases &middot; seeded June 2026 &middot; CIS corpus</div>
  </div>`;

  /* summary band */
  h += `<div class="overview-bar" style="margin-bottom:16px">
    <div class="overview-row">
      <span class="overview-label">Fulfilment</span>
      <span>${fulfilled} of ${all.length} fulfilled &middot; ${pct}%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dc-summary-band" style="margin-top:10px">
      <div class="dc-stat"><span class="dc-stat-n s-produced">${stats.produced}</span><span class="dc-stat-label">produced</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-by_ref">${stats.by_reference}</span><span class="dc-stat-label">by ref</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-proposed">${stats.proposed}</span><span class="dc-stat-label">proposed</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-partial">${stats.partial}</span><span class="dc-stat-label">partial</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-queued">${stats.queued}</span><span class="dc-stat-label">queued</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-projected">${stats.projected}</span><span class="dc-stat-label">projected</span></div>
      <div class="dc-stat"><span class="dc-stat-n s-unanchored">${stats.unanchored}</span><span class="dc-stat-label">unanchored</span></div>
    </div>
  </div>`;

  /* controls */
  const filterBtns = ['ALL','produced','by_reference','proposed','partial','queued','projected','unanchored'].map(f =>
    `<button class="dc-filter-btn${docFilter===f?' on':''}" onclick="setDocFilter('${f}')">${f==='by_reference'?'by&nbsp;ref':f}</button>`
  ).join('');

  h += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="dc-lens-strip">
      <button class="dc-lens-btn${docLens==='phase'?' on':''}" onclick="setDocLens('phase')">by phase</button>
      <button class="dc-lens-btn${docLens==='anchor'?' on':''}" onclick="setDocLens('anchor')">by anchor</button>
    </div>
    <div class="dc-filter-strip">${filterBtns}</div>
  </div>`;

  /* render deliverables by lens */
  if (docLens === 'phase') {
    DOC_PHASES.forEach((ph, i) => {
      const items = filtered.filter(d => d.phase === ph.id);
      const total = all.filter(d => d.phase === ph.id).length;
      if (items.length === 0 && docFilter !== 'ALL') return;
      h += `<div class="sh" style="margin-top:${i===0?'0':'18px'}">
        <span>Ph${ph.id} &middot; ${ph.name}</span>
        <span class="sh-count">${items.length}${docFilter!=='ALL'?' / '+total:''}</span>
      </div>`;
      if (items.length === 0) {
        h += `<p class="empty-note">No deliverables match filter.</p>`;
      } else {
        items.forEach(d => { h += docCard(d); });
      }
    });
  } else {
    /* anchor lens */
    DOC_ANCHORS.forEach((anc, i) => {
      const items = filtered.filter(d => d.anchor === anc);
      if (items.length === 0) return;
      h += `<div class="sh" style="margin-top:${i===0?'0':'18px'}">
        <span>${anc}</span>
        <span class="sh-count">${items.length}</span>
      </div>`;
      items.forEach(d => { h += docCard(d); });
    });
    /* unanchored group */
    const gaps = filtered.filter(d => d.anchor === null);
    if (gaps.length > 0) {
      h += `<div class="sh" style="margin-top:18px;border-color:var(--warn)">
        <span style="color:var(--warn)">unanchored &middot; gaps</span>
        <span class="sh-count" style="border-color:var(--warn);color:var(--warn)">${gaps.length}</span>
      </div>`;
      gaps.forEach(d => { h += docCard(d); });
    }
  }

  document.getElementById('mainPanel').innerHTML = h;
}

      <a href="AGENTS.md" class="ctx-link">AGENTS.md</a>

/* ── explorer ── */
const ALL_WAVES_EX = ['ALL', ...WAVE_ORDER];

function renderFilterBar() {
  document.getElementById('filterBar').innerHTML = ALL_WAVES_EX.map(w =>
    `<button class="filter-btn${exFilter===w?' on':''}" onclick="setEx('${w}')" aria-pressed="${exFilter===w}">${w}</button>`
  ).join('');
}

function setEx(w) { exFilter = w; renderFilterBar(); renderExplorer(DATA); }

document.getElementById('searchBox').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  renderExplorer(DATA);
});

function renderExplorer(nodes) {
  if (!nodes) return;
  let rows = nodes;
  if (exFilter !== 'ALL') rows = rows.filter(n => n.wave === exFilter);
  if (searchQ) rows = rows.filter(n =>
    n.id.toLowerCase().includes(searchQ) ||
    n.title.toLowerCase().includes(searchQ) ||
    (n.owner||'').toLowerCase().includes(searchQ) ||
    (n.verification||'').toLowerCase().includes(searchQ)
  );

  // sort: wave order, then numeric id within wave
  const wi = w => { const i = WAVE_ORDER.indexOf(w); return i >= 0 ? i : 99; };
  rows = [...rows].sort((a, b) => {
    const dw = wi(a.wave) - wi(b.wave);
    if (dw !== 0) return dw;
    const na = parseInt((a.id.match(/\d+/) || ['0'])[0]);
    const nb = parseInt((b.id.match(/\d+/) || ['0'])[0]);
    const na2 = parseInt((a.id.match(/\d+\.(\d+)/) || [,0])[1]);
    const nb2 = parseInt((b.id.match(/\d+\.(\d+)/) || [,0])[1]);
    if (na !== nb) return na - nb;
    return na2 - nb2;
  });

  const tbody = document.getElementById('exBody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--faint);text-align:center;padding:20px 10px;font-size:11px;">no results</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(n => `<tr>
    <td class="c-id">${n.id}</td>
    <td class="c-title">${n.title}</td>
    <td class="c-wave">${n.wave}</td>
    <td class="c-owner">${n.owner||''}</td>
    <td class="c-status">${badge(n.status)}</td>
    <td class="c-verif">${(n.verification||'').replace(/\+/g,' + ')}</td>
  </tr>`).join('');
}

/* ── filter ── */
function setWave(w) {
  hubMode = false;
  loopMode = false;
  docMode = false;
  waveFilter = waveFilter === w ? null : w;
  const hc = document.getElementById('hubChip');
  if (hc) hc.style.outline = '';
  const lc = document.getElementById('loopChip');
  if (lc) lc.style.outline = '';
  const dc = document.getElementById('docChip');
  if (dc) dc.style.outline = '';

}

/* ── render all ── */
function render() {
  if (!DATA) return;
  renderRail(DATA);
  renderChips(DATA);
  if (docMode) {
    renderDocMain();
    renderDocCtx();
  } else if (loopMode) {
    renderLoopMain();
    renderLoopCtx();
  } else if (hubMode) {
    renderHubMain();
    renderHubCtx();
  } else {
    renderMain(DATA);
    renderCtx(DATA);
  }
  renderExplorer(DATA);
  renderFilterBar();
}

/* ── fetch data ── */
fetch('milestones/index.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => {
    DATA = enrich(d.nodes);
    render();
  })
  .catch(e => {
    document.getElementById('mainPanel').innerHTML =
      `<div style="color:var(--warn);font-size:12px;padding:24px;line-height:1.7;">
        Could not load <code>milestones/index.json</code>.<br>
        ${e.message}<br><br>
        <span style="color:var(--faint)">Open via GitHub Pages or a local server (not file://).</span>
      </div>`;
  });
</script>
</body>
</html>
