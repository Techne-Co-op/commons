<style>
:root{color-scheme:dark;

--heading:#2a2520;--text:#3d3833;--muted:#6e675f;--faint:#a39b90;
--ok:#5f7a52;--ok-dim:rgba(95,122,82,.12);--info:#5b7286;--info-dim:rgba(91,114,134,.12);--warn:#9e4f3d;--warn-dim:rgba(158,79,61,.12);
--shadow-1:0 1px 3px rgba(42,37,32,.08);--shadow-2:0 4px 16px rgba(42,37,32,.10);}}
[data-mode="light"]{color-scheme:light;
--bg:#faf8f5;--surface:#ffffff;--surface-raised:#ffffff;--border:#e2ddd5;--border-strong:#c9c2b8;

--heading:#2a2520;--text:#3d3833;--muted:#6e675f;--faint:#a39b90;
--ok:#5f7a52;--ok-dim:rgba(95,122,82,.12);--info:#5b7286;--info-dim:rgba(91,114,134,.12);--warn:#9e4f3d;--warn-dim:rgba(158,79,61,.12);

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;line-height:1.6;
transition:background-color var(--dur-mode) var(--ease),color var(--dur-mode) var(--ease);overflow:hidden;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
button:focus-visible,input:focus-visible{outline:2px solid var(--terra);outline-offset:2px;}
.app{height:100vh;display:flex;flex-direction:column;}
.top{display:flex;align-items:center;gap:var(--s4);padding:var(--s3) var(--s5);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.top h1{font-family:'Libre Baskerville',Georgia,serif;font-size:19px;font-weight:700;color:var(--heading);letter-spacing:-.3px;white-space:nowrap;}
.top .sub{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);}
.top .grow{flex:1;}
.seg{display:flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--surface);}
.seg button{padding:5px 13px;font-size:11.5px;color:var(--muted);letter-spacing:.06em;transition:color var(--dur-micro) var(--ease),background-color var(--dur-micro) var(--ease);}
.seg button[aria-pressed="true"]{color:var(--terra-text);background:var(--terra-dim);}
.mode-toggle{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 13px;display:flex;align-items:center;gap:var(--s2);
transition:border-color var(--dur-micro) var(--ease),color var(--dur-micro) var(--ease);}
.mode-toggle:hover{border-color:var(--terra);color:var(--terra-text);}
.mode-toggle svg{width:14px;height:14px;stroke:currentColor;}
.main{flex:1;display:grid;grid-template-columns:200px minmax(0,1fr) 400px;gap:var(--s4);padding:var(--s4) var(--s5) var(--s3);min-height:0;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;min-height:0;
transition:background-color var(--dur-mode) var(--ease);}
.phead{padding:var(--s3) var(--s4) 0;}
.plabel{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra-text);}
.prule{width:40px;height:1px;background:linear-gradient(to right,var(--terra),transparent);margin:var(--s2) 0 var(--s3);}
.pscroll{overflow:auto;padding:0 var(--s4) var(--s4);min-height:0;scrollbar-width:thin;}
/* rail */
.rolebtn,.grpbtn{width:100%;text-align:left;border:1px solid var(--border);border-radius:8px;padding:5px var(--s3);margin-bottom:6px;background:var(--bg);
transition:border-color var(--dur-micro) var(--ease),background-color var(--dur-micro) var(--ease);}
.rolebtn:hover,.grpbtn:hover{border-color:var(--terra);}
.rolebtn[aria-pressed="true"],.grpbtn[aria-pressed="true"]{border-color:var(--terra);background:var(--terra-dim);}
.rolebtn .ra{font-size:10px;letter-spacing:.14em;color:var(--terra-text);margin-right:var(--s2);}
.rolebtn .rn{color:var(--text);font-size:11.5px;}
.railnote{font-size:10px;color:var(--faint);line-height:1.7;margin:var(--s2) 0 var(--s3);}
/* legend + tiles */
.gbar{display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;padding:var(--s3) var(--s4);}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:2px 9px;}
.lg .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.lg.ok{color:var(--ok);background:var(--ok-dim);border-color:var(--ok);}
.lg.info{color:var(--info);background:var(--info-dim);border-color:var(--info);}
.lg.warn{color:var(--warn);background:var(--warn-dim);border-color:var(--warn);}
.gnote{font-size:10px;color:var(--faint);}
.gbar .grow{flex:1;}
.zbtn{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:2px 10px;background:var(--bg);
transition:border-color var(--dur-micro) var(--ease),color var(--dur-micro) var(--ease);}
.zbtn:hover{border-color:var(--terra);color:var(--terra-text);}
/* matrix */
.mwrap{overflow:auto;flex:1;min-height:0;padding:0 var(--s4) var(--s4);scrollbar-width:thin;}
table.mx{border-collapse:separate;border-spacing:2px;}
table.mx th{position:sticky;top:0;background:var(--surface);z-index:2;font-weight:400;font-size:9.5px;letter-spacing:.1em;color:var(--muted);padding:4px 2px;}
table.mx th.rt{writing-mode:vertical-rl;transform:rotate(180deg);height:74px;vertical-align:bottom;}
table.mx th:hover{color:var(--terra-text);cursor:pointer;}
table.mx td.tn{position:sticky;left:0;background:var(--surface);z-index:1;font-size:10.5px;color:var(--heading);padding:2px 8px 2px 2px;white-space:nowrap;cursor:pointer;}
table.mx td.tn:hover{color:var(--terra-text);}
table.mx td.tn .grp{color:var(--faint);font-size:8.5px;letter-spacing:.14em;display:block;}
.cell{width:34px;height:22px;border-radius:5px;font-size:9px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;
border:1px solid transparent;transition:border-color var(--dur-micro) var(--ease),opacity var(--dur-micro) var(--ease);}
.cell.s-ok{color:var(--ok);background:var(--ok-dim);}
.cell.s-info{color:var(--info);background:var(--info-dim);}
.cell.s-warn{color:var(--warn);background:var(--warn-dim);}
.cell.none{color:var(--faint);background:var(--bg);}
.cell:hover{border-color:var(--terra);}
.cell.sel{border-color:var(--terra);box-shadow:0 0 0 1px var(--terra);}
.cell.dim,tr.dim .cell,th.dim,td.dim{opacity:.25;}
.grphead td{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra-text);padding:10px 2px 2px;position:sticky;left:0;background:var(--surface);}
/* detail */
.det .dhead{display:flex;align-items:baseline;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s2);}
.det .did{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--terra-text);}
.det h2{font-family:'Libre Baskerville',Georgia,serif;font-size:16.5px;font-weight:700;color:var(--heading);line-height:1.4;}
.det .plain{font-family:'Libre Baskerville',Georgia,serif;font-style:italic;font-size:13.5px;color:var(--text);line-height:1.75;margin:var(--s2) 0 var(--s3);}
.det .blk{margin-bottom:var(--s4);}
.det .bk{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:var(--s1);}
.det .bv{font-size:11.5px;line-height:1.8;color:var(--text);}
.det .bv.serif{font-family:'Libre Baskerville',Georgia,serif;font-size:13px;}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:2px 9px;border-radius:999px;border:1px solid;}
.chip .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.chip.ok{color:var(--ok);background:var(--ok-dim);border-color:var(--ok);}
.chip.info{color:var(--info);background:var(--info-dim);border-color:var(--info);}
.chip.warn{color:var(--warn);background:var(--warn-dim);border-color:var(--warn);}
.prov{display:inline-flex;align-items:baseline;gap:var(--s2);font-size:10.5px;color:var(--muted);background:var(--bg);
border:1px solid var(--border);border-left:2px solid var(--terra);border-radius:6px;padding:4px 10px;}
.prov .cite{color:var(--terra-text);}
.det pre{font-size:10.5px;line-height:1.7;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;
padding:var(--s3);overflow:auto;max-height:300px;}
.linkish{color:var(--terra-text);border-bottom:1px solid transparent;}
.linkish:hover{border-bottom-color:var(--terra);}
.foot{font-size:10px;color:var(--faint);text-align:center;padding:var(--s2) var(--s5) var(--s3);border-top:1px solid var(--border);}
.viewseg{display:none;}
@media (max-width:980px){
 body{overflow:auto;}.app{height:100dvh;}
 .main{grid-template-columns:1fr;overflow:hidden;}
 .panel{display:none;}
 body[data-view="rail"] .panel.rail,body[data-view="mx"] .panel.mid,body[data-view="detail"] .panel.det{display:flex;}
 .viewseg{display:flex;margin:0 var(--s5) var(--s3);}
 .viewseg button{flex:1;}
 .top h1{font-size:16px;}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0ms!important;animation:none!important;}}
</style>

<script>

 {a:"INV",n:"Investor Member",p:"investor-1",c:"draft-bylaws:\u00a71.3, \u00a72.6.2",d:"Own records always; class-specific voting where required. Fields beyond existence await the investor framework (CIS \u00a717)."},
 {a:"SUS",n:"Suspended Member",p:"suspended-1",c:"draft-bylaws:\u00a71.10.1",d:"Read own records. No voting, no participation in management."},

 {a:"OFF",n:"Officer",p:"officer-treasurer / officer-secretary",c:"draft-bylaws:\u00a7IV",d:"Role-specific authority: Treasurer over financial records, Secretary over minutes and registers, President over contracts."},
 {a:"CMT",n:"Committee Member",p:"committee-1",c:"draft-bylaws:\u00a73.18",d:"Director access plus full committee working materials."},
 {a:"ADM",n:"Administrator",p:"admin-1",c:"policy",d:"Operational access for onboarding, support, data stewardship. Does not create substantive decisions."},
 {a:"NOU",n:"Agent (Nou)",p:"nou via gateway as member-a",c:"principle 01",d:"Scoped impersonation: inherits the permissions of the invoking user, never more. All actions logged."},
 {a:"HAP",n:"Hub Applicant",p:"hubapplicant-1",c:"grant:\u00a72",d:"Own application and selection status. No access to attendee records."},
 {a:"HVI",n:"Hub Visitor",p:"anon (hub surface)",c:"grant:\u00a72",d:"Public educational materials, opportunity listings, event calendar."},
 {a:"HMB",n:"Hub Member",p:"hubmember-1",c:"grant:\u00a72",d:"Co-working access, event registration, own attendance history. Distinct from Patron Member."},
 {a:"LIA",n:"EE Liaison",p:"liaison-1",c:"grant:\u00a73",d:"Read access to KPI dashboard, monthly reports, aggregate utilization. No individual applicant or attendee records without justification."}

const RIX={};ROLES.forEach((r,i)=>RIX[r.a]=i);
/* scopes */
const SCOPES={
 none:{g:"\u00b7",w:"no access",pp:"sees nothing here"},
 own:{g:"own",w:"own rows only",pp:"can see only what is theirs"},
 agg:{g:"agg",w:"aggregates via view",pp:"sees totals, never individuals"},

 all:{g:"all",w:"full read",pp:"can read every row"},

const DD=["none","drv","plan W0.6 \u00b7 default-deny baseline"];
const MEMB=["PAT","INV","SUS","FOR","DIR","OFF","CMT"]; /* member-class roles incl. governance roles */
const GOVR=["PAT","INV","DIR","OFF","CMT"];             /* members in good standing + governance */
function C(over){const c={};ROLES.forEach(r=>c[r.a]=DD);for(const k in over)c[k]=over[k];
 c.NOU=["mir","prd","principle 01","inherits the invoking user; probed pairwise against every persona"];return c;}

const T=[
/* core 19 */
{t:"agents",g:"core",anchor:"Agent \u00b7 natural and legal persons",
 w:["self-edit of own contact fields under member session [prd W1.5]; creation via admission workflow or service role [drv]","prd/drv"],
 cells:C(Object.assign(
  fan(GOVR,["own","prd","\u00a71.2 own records; list via member_directory view \u00a71.7","direct rows: self only; the directory view carries the member list"]),

{t:"stock_ledger",g:"core",anchor:"Resource \u00b7 draft-bylaws:\u00a71.13",

  {SUS:["own","prd","\u00a71.10.1"],FOR:["own","prd","\u00a71.11"],
   DIR:["agg","prd","P pathway Phase 02 \u00b7 visibility scoped to the member; aggregate views serve governance"],
   CMT:["agg","drv","same scope as Director"],
   OFF:["rol","prd","\u00a7IV Treasurer","Treasurer: all; others: aggregate"],
   ADM:["all","prd","CIS \u00a708 \u00b7 administrator view shows all"]}))},
{t:"capital_events",g:"core",anchor:"Event \u00b7 draft-bylaws:\u00a75.1, \u00a75.3, \u00a75.4",
 w:["double-entry inserts via allocation and distribution workflows; manual allocation entry pre-R1 by Treasurer/admin session [plan W3.3]; immutable thereafter [drv]","plan/drv"],
 cells:C(Object.assign(
  fan(["PAT","INV"],["own","prd","CIS \u00a708 \u00b7 full event history of own account"]),
  {SUS:["own","prd","\u00a71.10.1"],FOR:["own","prd","\u00a71.11"],
   DIR:["agg","prd","P Phase 02"],CMT:["agg","drv","as Director"],
   OFF:["rol","prd","\u00a7IV Treasurer","Treasurer: all"],ADM:["all","prd","CIS \u00a708"]}))},
{t:"agreements",g:"core",anchor:"Agreement \u00b7 bylaws, policies, MAs",
 w:["versions appended via repository workflow; President executes contracts [prd \u00a7IV]","prd"],

const FINDINGS=[
 ["F1","The cooperative application has no table.","The Applicant role (\u00a71.4) is defined against an application record that none of the nineteen core tables holds; hub_applications is grant-scoped. Routed to a C6 addendum and the W1.6 brief: either a coop_applications table or an explicit reuse decision, before admission ships."],
 ["F2","Minutes versus attended materials.","Principle 07 makes meeting minutes accessible without friction; \u00a72.9 scopes meeting materials to attendees. Encoded here as: ratified minutes member-open, pre-meeting materials attended-scoped. Confirm at W4.0."],
 ["F3","The suspended member's reading rights.","\u00a71.10.1 says read own records; \u00a718.1 grants members information rights. The matrix encodes the narrow reading (own + what governs them) and marks every affected cell. Counsel confirms at R1."],
 ["F4","Ballots and administrators.","Individual votes are encoded as sealed from administrators, tallies via view only, pending a reading of \u00a71.6 vote privacy. Decide before W4.2 builds the votes table."],
 ["F5","Investor cells are placeholders.","Investor Member mirrors Patron scopes except class-specific voting (\u00a72.6.2); richer treatment awaits the investor framework (CIS \u00a717). Cells marked accordingly."]
];

 ROLES.forEach(r=>{h+=`<button class="rolebtn" data-r="${r.a}" aria-pressed="${S.role===r.a}"><span class="ra">${r.a}</span><span class="rn">${r.n}</span></button>`;});
 h+='<div class="railnote" style="margin-top:var(--s3)">groups</div>';
 [["core","core \u00b7 19"],["hub","hub \u00b7 12"],["substrate","substrate \u00b7 8"]].forEach(([g,t])=>{
  h+=`<button class="grpbtn" data-g="${g}" aria-pressed="${S.grp===g}">${t}</button>`;});
 h+=`<button class="grpbtn" data-f="1" style="margin-top:var(--s3)">findings \u00b7 ${FINDINGS.length}</button>`;

 el.innerHTML=h;

function rMx(){

 h+='</tr></thead><tbody>';
 let lastG=null;
 T.forEach((t,ti)=>{
  if(S.grp&&t.g!==S.grp)return;
  if(t.g!==lastG){lastG=t.g;h+=`<tr class="grphead"><td colspan="${ROLES.length+1}">${t.g}</td></tr>`;}
  h+=`<tr><td class="tn" data-t="${ti}">${t.t}</td>`;
  ROLES.forEach(r=>{
   const c=t.cells[r.a];const sc=SCOPES[c[0]];const cls=srcCls(c[1]);
   const dimSf=S.sf!=="all"&&cls!==S.sf;const dimR=S.role&&S.role!==r.a;
   const seld=S.sel&&S.sel[0]===ti&&S.sel[1]===r.a;
   const none=c[0]==="none";
   h+=`<td><button class="cell ${none?"none":"s-"+cls}${dimSf||dimR?" dim":""}${seld?" sel":""}" data-t="${ti}" data-r="${r.a}"
     aria-label="${t.t} \u00d7 ${r.a}: ${sc.w}, ${SRC[c[1]].w}">${sc.g}</button></td>`;});
  h+='</tr>';});
 h+='</tbody></table>';
 el.innerHTML=h;
 el.querySelectorAll(".cell").forEach(b=>b.onclick=()=>{S.sel=[+b.dataset.t,b.dataset.r];rAll();showCell();setMobile("detail");});

 el.querySelectorAll("td.tn").forEach(td=>td.onclick=()=>{S.sel=null;rAll();showTable(+td.dataset.t);setMobile("detail");});
}

 const p=ROLES[RIX[role]].p;
 switch(scope){
  case "none":return `as ${p}: SELECT on ${t} returns zero rows (or permission denied). Cross-id probes return zero.`;
  case "own":return `as ${p}: SELECT returns only rows where the subject is ${p}; probing another persona's id returns zero rows.`;
  case "agg":return `as ${p}: direct SELECT on ${t} denied or empty; the governing view returns aggregate rows carrying no personal identifiers.`;
  case "att":return `as ${p}: rows joined to meetings with own attendance return; rows for unattended meetings return zero.`;
  case "all":return `as ${p}: SELECT returns the full fixture set for ${t} (count asserted against seed).`;
  case "pub":return `as anon: SELECT on the declared public columns of ${t} succeeds; undeclared columns are absent from the view.`;
  case "mir":return `pairwise: every probe in this column equals the invoking persona's result; run the full suite once as each persona through the gateway and diff.`;
  case "rol":return `officer sub-roles asserted separately: see the cell note for which officer holds which scope.`;
 }}
function showCell(){
 const [ti,ra]=S.sel;const t=T[ti];const r=ROLES[RIX[ra]];const c=t.cells[ra];const sc=SCOPES[c[0]];const src=SRC[c[1]];
 dlab(`Detail \u00b7 ${t.t} \u00d7 ${ra}`);
 det().innerHTML=`
  <div class="dhead"><span class="did">${t.t} \u00d7 ${r.n}</span>
   <span class="chip ${src.cls}"><span class="dot"></span>${src.w}</span></div>
  <h2>${sc.w}</h2>
  ${S.lens==="plain"?`<p class="plain">${r.n} ${sc.pp} in ${t.t}.</p>`:""}
  <div class="blk"><div class="bk">citation</div><span class="prov"><span class="cite">${c[2]}</span></span></div>
  ${c[3]?`<div class="blk"><div class="bk">note</div><div class="bv serif">${c[3]}</div></div>`:""}
  ${S.lens==="tech"?`<div class="blk"><div class="bk">probe expectation \u00b7 pgTAP</div><div class="bv">${probeSpec(c[0],ra,t.t)}</div></div>`:""}
  <div class="blk"><div class="bk">write rules \u00b7 ${t.t}</div><div class="bv">${t.w[0]} <span style="color:var(--faint)">[${t.w[1]}]</span></div></div>
  <div class="blk"><div class="bk">table anchor</div><div class="bv">${t.anchor}</div></div>
  <div class="blk"><div class="bk">role brief</div><div class="bv serif">${r.d}</div>
   <div class="bv" style="color:var(--faint)">persona: ${r.p} \u00b7 ${r.c}</div></div>
  ${src.cls==="warn"?`<div class="blk"><div class="bk">adoption</div><div class="bv serif">A proposed cell binds no one. Adoption is a PR editing docs/probe-matrix.json with an organizer review; the cell turns committed there, not here.</div></div>`:""}`;
}
function showRole(ra){
 if(!ra)return showDefault();
 const r=ROLES[RIX[ra]];dlab(`Detail \u00b7 role ${ra}`);
 let tally={none:0,own:0,agg:0,att:0,all:0,pub:0,mir:0,rol:0};
 T.forEach(t=>tally[t.cells[ra][0]]++);
 det().innerHTML=`
  <div class="dhead"><span class="did">${ra}</span></div><h2>${r.n}</h2>
  <p class="plain">${r.d}</p>
  <div class="blk"><div class="bk">authority</div><span class="prov"><span class="cite">${r.c}</span></span></div>
  <div class="blk"><div class="bk">persona</div><div class="bv">${r.p}</div></div>
  <div class="blk"><div class="bk">scope tally across ${T.length} tables</div>
   <div class="bv">${Object.entries(tally).filter(([k,v])=>v).map(([k,v])=>`${SCOPES[k].g} ${v}`).join(" \u00b7 ")}</div></div>
  <div class="blk"><div class="bv serif">The column is focused in the matrix; every cell carries its own citation and probe.</div></div>`;
}
function showTable(ti){
 const t=T[ti];dlab(`Detail \u00b7 ${t.t}`);
 det().innerHTML=`
  <div class="dhead"><span class="did">${t.g}</span></div><h2>${t.t}</h2>
  <div class="blk"><div class="bk">anchor</div><span class="prov"><span class="cite">${t.anchor}</span></span></div>
  <div class="blk"><div class="bk">write rules</div><div class="bv">${t.w[0]} <span style="color:var(--faint)">[${t.w[1]}]</span></div></div>
  <div class="blk"><div class="bk">read scopes</div><div class="bv">${ROLES.map(r=>{const c=t.cells[r.a];return c[0]==="none"?null:`${r.a} ${SCOPES[c[0]].g}`;}).filter(Boolean).join(" \u00b7 ")||"none beyond defaults"}</div></div>
  <div class="blk"><div class="bv serif">Click any cell in this row for its citation and probe.</div></div>`;
}
function showFindings(){
 dlab("Detail \u00b7 findings");
 det().innerHTML=`<div class="dhead"><span class="did">findings</span></div>
  <h2>What the matrix surfaced</h2>
  <p class="plain">Consolidating forced five calls the PRDs do not make. Each is encoded the cautious way and marked; none is settled here.</p>`+
  FINDINGS.map(f=>`<div class="blk"><div class="bk">${f[0]} \u00b7 ${f[1]}</div><div class="bv serif">${f[2]}</div></div>`).join("");
}
function showJson(){
 dlab("Detail \u00b7 machine view");
 const data={roles:ROLES.map(r=>({abbr:r.a,name:r.n,persona:r.p,authority:r.c})),
  tables:T.map(t=>({table:t.t,group:t.g,anchor:t.anchor,writes:t.w[0],writes_src:t.w[1],
   cells:Object.fromEntries(ROLES.map(r=>{const c=t.cells[r.a];return[r.a,{scope:c[0],src:c[1],cite:c[2],note:c[3]||null}];}))}))};
 det().innerHTML=`<div class="dhead"><span class="did">docs/probe-matrix.json</span></div>
  <h2>Machine view</h2>
  <p class="plain">The same cells as data. In the repository this file is the source; ci:rls-audit generates one pgTAP assertion per cell from it, and this instrument renders it.</p>
  <pre>${JSON.stringify(data,null,1).replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>`;
}
function showDefault(){
 dlab("Detail");
 det().innerHTML=`
  <div class="dhead"><span class="did">how to read this</span></div>
  <h2>Every cell is a promise with a test</h2>
  <p class="plain">Rows are tables, columns are the fifteen roles, and each cell names how much of a table a role may read: nothing, their own rows, aggregates, attended meetings, everything, or the public surface. Color carries confidence, not permission: moss cells restate what the PRDs or the seed already commit, slate cells are consequences I derived from stated rules, clay cells are proposals awaiting adoption.</p>
  <div class="blk"><div class="bk">the review that matters</div><div class="bv serif">Filter to proposed and walk the clay. Each adoption is a PR editing docs/probe-matrix.json; ci:rls-audit then holds the database to every cell, one pgTAP assertion each, forever after.</div></div>
  <div class="blk"><div class="bk">two columns to know</div><div class="bv serif">NOU is uniform by construction: the agent inherits the invoking user and is probed pairwise against every persona. GST on hub_applications is the one asymmetric cell in the system: anonymous insert allowed, read denied.</div></div>
  <div class="blk"><div class="bk">provenance</div>
   <span class="prov"><span class="cite">CIS \u00a707 \u00b7 Hub \u00a705 \u00b7 plan v0.1 \u00b7 C6</span></span></div>`;
}

function rAll(){rRail();rGbar();rMx();}
document.querySelectorAll("[data-sf]").forEach(b=>b.onclick=()=>{S.sf=b.dataset.sf;
 document.querySelectorAll("[data-sf]").forEach(x=>x.setAttribute("aria-pressed",x===b));rMx();});
const lp=document.getElementById("lensPlain"),lt=document.getElementById("lensTech");
function setLens(l){S.lens=l;document.body.dataset.lens=l;lp.setAttribute("aria-pressed",l==="plain");lt.setAttribute("aria-pressed",l==="tech");
 if(S.sel)showCell();}
lp.onclick=()=>setLens("plain");lt.onclick=()=>setLens("tech");
document.querySelectorAll(".viewseg button").forEach(b=>b.onclick=()=>setMobile(b.dataset.v,true));
function setMobile(v,force){if(!window.matchMedia("(max-width:980px)").matches&&!force)return;
 document.body.dataset.view=v;document.querySelectorAll(".viewseg button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.v===v));}
(function(){var root=document.documentElement,btn=document.getElementById("modeToggle"),label=document.getElementById("modeLabel"),icon=document.getElementById("modeIcon");
var moon='<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
var sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
function apply(m){root.setAttribute("data-mode",m);label.textContent=m;icon.innerHTML=m==="dark"?moon:sun;}
var pl=window.matchMedia("(prefers-color-scheme: light)");apply(pl.matches?"light":"dark");
pl.addEventListener("change",e=>apply(e.matches?"light":"dark"));
btn.addEventListener("click",()=>apply(root.getAttribute("data-mode")==="dark"?"light":"dark"));})();
rAll();showDefault();
</script>
