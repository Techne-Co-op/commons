name: milestone-validate
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/validate.py
      # Ledger exhaustiveness: code changes must travel with a milestone touch.
      - name: ledger exhaustiveness
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^(supabase|apps|design|scripts)/' && \
             ! echo "$CHANGED" | grep -q '^milestones/'; then
            echo "::error::code changed without a milestone status change"; exit 1; fi
      # On main, commit the regenerated board back if the files drifted.
      # Requires github-actions[bot] to have push access; if branch protection
      # blocks the push (exit non-zero), the step is skipped gracefully — the
      # validate check above still passed and the ledger is coherent.
      # Long-term fix: W0.19/W0.20 migrate to Actions-based Pages deployment,
      # at which point this step becomes unnecessary (generated files are never
      # committed to main).
      - name: commit status board (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          git config user.name "milestone-validate"
          git config user.email "actions@users.noreply.github.com"
          git add milestones/index.json milestones/STATUS.md
          git diff --cached --quiet || (git commit -m "chore(ledger): regenerate status board" && git push)
